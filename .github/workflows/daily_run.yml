name: Daily Stock Selection

on:
  schedule:
    # 每天北京时间 17:00 (UTC 09:00) 运行（Tushare 日线数据约 16:00 后更新）
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore Database Cache
      uses: actions/cache/restore@v4
      with:
        path: database/stock_data.db
        key: stock-db-${{ github.run_id }}
        restore-keys: |
          stock-db-

    - name: Run Stock Selection
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        RECEIVER_EMAIL: ${{ secrets.SMTP_USER }}
        DB_PATH: "database/stock_data.db"
        SCREEN_STRATEGIES: "breakout_30"
      run: python main.py

    - name: Save Database Cache
      uses: actions/cache/save@v4
      if: success()
      with:
        path: database/stock_data.db
        key: stock-db-${{ github.run_id }}
