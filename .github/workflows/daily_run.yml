name: Daily Stock Selection

on:
  schedule:
    # 每天北京时间 18:10 (UTC 10:10) 运行
    - cron: '10 10 * * 1-5'
  workflow_dispatch: # 支持手动触发

jobs:
  run-strategy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore Database Cache
      uses: actions/cache@v3
      with:
        path: database/stock_data.db
        key: stock-db-${{ github.run_id }}
        restore-keys: |
          stock-db-

    - name: Run Stock Selection
      env:
        TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        RECEIVER_EMAIL: ${{ secrets.SMTP_USER }}
        DB_PATH: "database/stock_data.db"
        SCREEN_STRATEGIES: "breakout_30"
      run: python main.py

    - name: Save Database Cache
      uses: actions/cache/save@v3
      if: always()
      with:
        path: database/stock_data.db
        key: stock-db-${{ github.run_id }}
